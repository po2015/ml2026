<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" role="img" aria-label="MediaLocalize">
  <title>MediaLocalize</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3AB5FF"/>
      <stop offset="100%" stop-color="#0052CC"/>
    </linearGradient>
    <radialGradient id="gl" cx="32%" cy="20%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.20)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <!-- Apple-style squircle -->
  <rect width="80" height="80" rx="18" fill="url(#bg)"/>
  <!-- Glass highlight -->
  <rect width="80" height="80" rx="18" fill="url(#gl)"/>
  <!-- M mark — perfect 45° geometry -->
  <polyline
    points="16,64 16,16 40,40 64,16 64,64"
    fill="none"
    stroke="rgba(255,255,255,0.95)"
    stroke-width="6.5"
    stroke-linecap="round"
    stroke-linejoin="round"/>
</svg>
