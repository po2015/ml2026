baseURL = "https://www.medialocalize.com/"
languageCode = "en-us"
title = "MediaLocalize — AI Websites & Localization"
theme = "ml"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
canonifyURLs = false

[languages]
  [languages.en]
    languageName = "English"
    weight = 1
    title = "MediaLocalize — AI Websites & Localization"
    [languages.en.params]
      description = "AI-powered website building and professional multilingual localization services."

  [languages.zh]
    languageName = "中文"
    weight = 2
    contentDir = "content/zh"
    [languages.zh.params]
      description = "AI 驱动的建站与专业多语言本地化服务。"

[params]
  brandColor = "#0071e3"
  logoPath = "/images/logo.svg"
  logoIconPath = "/images/logo-icon.svg"
  logoDarkPath = "/images/logo-dark.svg"

paginate = 6

[markup.goldmark.renderer]
  unsafe = true

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[related]
  threshold = 60
  includeNewer = true
  toLower = true
  [[related.indices]]
    name    = "tags"
    weight  = 100
  [[related.indices]]
    name    = "category"
    weight  = 70
  [[related.indices]]
    name    = "date"
    weight  = 10
