baseURL = "https://www.medialocalize.com/"
languageCode = "en-us"
title = "MediaLocalize — AI Websites & Localization"
theme = "ml"
defaultContentLanguage = "en"
enableRobotsTXT = true
canonifyURLs = false

[params]
  brandColor = "#0071e3"
  logoPath = "/images/logo.svg"
  logoIconPath = "/images/logo-icon.svg"
  logoDarkPath = "/images/logo-dark.svg"

[pagination]
  pagerSize = 6

[taxonomies]
  tag = "tags"
  category = "category"

[markup.goldmark.renderer]
  unsafe = true

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[related]
  threshold = 60
  includeNewer = true
  toLower = true
  [[related.indices]]
    name    = "tags"
    weight  = 100
  [[related.indices]]
    name    = "category"
    weight  = 70
  [[related.indices]]
    name    = "date"
    weight  = 10
