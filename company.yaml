        - id: hero
          type: full_viewport_hero
          bg: dark (#000000)
          headline_en: "We Help the World Communicate"
          headline_zh: "我们让世界更好地沟通"

        - id: mission
          type: text_block_wide
          bg: light (#f5f5f7)
          headline_en: "Our Mission"
          headline_zh: "我们的使命"

        - id: team
          type: team_grid
          bg: light (#f5f5f7)
          headline_en: "The Team"
          headline_zh: "团队介绍"

        - id: values
          type: three_column_icons
          bg: dark (#000000)
          headline_en: "Our Values"
          headline_zh: "我们的价值观"
          items:
            - icon: speed
              title_en: Speed
              title_zh: 高效
            - icon: precision
              title_en: Precision
              title_zh: 精准
            - icon: global
              title_en: Global Mindset
              title_zh: 全球视野

        - id: partners
          type: logo_strip
          bg: light (#f5f5f7)
          headline_en: "Trusted By"
          headline_zh: "合作伙伴"

    - id: news
      path: /news/
      template: blog_list
      title_en: "News & Updates — MediaLocalize"
      title_zh: "动态 — MediaLocalize"
      note: "Regular content updates; Hugo content type: news"
      taxonomy:
        categories: [Company News, Industry Insights, Product Updates, Case Studies]
        tags: flexible
      sections:
        - id: hero
          type: page_hero
          bg: light (#f5f5f7)
          headline_en: "Latest News"
          headline_zh: "最新动态"
        - id: article_grid
          type: blog_card_grid
          posts_per_page: 12
          sidebar: false

      article_detail:
        path: /news/{slug}/
        template: news_single
        sections: [article_header, article_body, related_posts, cta_banner]

    - id: contact
      path: /contact/
      template: contact
      title_en: "Contact Us — MediaLocalize"
      title_zh: "联系我们 — MediaLocalize"
      sections:
        - id: hero
          type: page_hero
          bg: dark (#000000)
          headline_en: "Let's Work Together"
          headline_zh: "期待与您合作"

        - id: contact_form
          type: split_form
          bg: light (#f5f5f7)
          left: contact_info (email, WeChat QR, business hours)
          right: inquiry_form (name, email, service_type, message, file_upload)

  # ── Hugo content structure ──────────────────────────────────
  hugo_content_types:
    - name: news
      path: content/news/
      archetype: news
      fields: [title, date, author, category, tags, summary, thumbnail, body]

    - name: cases
      path: content/cases/
      archetype: case
      fields: [title, date, client, industry, services, challenge, solution, results, images, testimonial]

    - name: services
      path: content/services/
      archetype: service
      fields: [title, icon, short_description, long_description, deliverables, pricing_ref]

  # ── SEO & Performance Notes ─────────────────────────────────
  seo:
    sitemap: true
    robots_txt: true
    canonical_urls: true
    structured_data:
      - Organization
      - LocalBusiness
      - Service
      - Article (news pages)
    og_meta: true
    twitter_cards: true
    hreflang: true   # bilingual en/zh alternate tags

  performance:
    lazy_load_images: true
    scroll_reveal_animation: true   # fade-in on scroll (CSS IntersectionObserver)
    preload_fonts: true
    minify_css_js: true
    image_formats: [webp, avif]
    cdn: global
