          body_zh: "上传文件，24 小时内收到详细报价。"

    - id: cases
      path: /cases/
      template: case_list
      title_en: "Client Cases — MediaLocalize"
      title_zh: "客户案例 — MediaLocalize"
      sections:
        - id: hero
          type: page_hero
          bg: dark (#000000)
          headline_en: "Real Projects, Real Results"
          headline_zh: "真实项目，真实成果"

        - id: filter_bar
          type: filter_tabs
          bg: light (#f5f5f7)
          filters:
            - All / 全部
            - Website Building / 建站
            - DTP
            - Dubbing / 配音
            - Video / 视频
            - E-Learning / 电子课程

        - id: case_grid
          type: masonry_card_grid
          bg: light (#f5f5f7)

      case_detail:
        path: /cases/{slug}/
        template: case_single
        sections: [hero_image, challenge, solution, result, metrics, testimonial, related_cases]

    - id: about
      path: /about/
      template: about
      title_en: "About MediaLocalize"
      title_zh: "关于 MediaLocalize"
